<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dib's Cat Garden 🐱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a0a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ---- STARS BG ---- */
    #stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
      opacity: 0.7;
    }
    @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }

    /* ---- SCREENS ---- */
    #app {
      position: relative;
      z-index: 1;
      width: min(680px, 100vw);
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .screen.active { display: flex; }

    /* ---- WELCOME SCREEN ---- */
    #welcome-screen {
      text-align: center;
      padding: 40px 24px;
      gap: 20px;
    }

    #welcome-screen h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(14px, 3vw, 20px);
      color: #ffcfe8;
      line-height: 1.6;
      text-shadow: 3px 3px 0 #a0408a, 6px 6px 0 #5a1050;
    }

    .pixel-cats-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 8px 0;
    }

    #welcome-screen .message-box {
      background: rgba(255,255,255,0.07);
      border: 3px solid #ff9ee8;
      border-radius: 16px;
      padding: 20px 28px;
      max-width: 440px;
      color: #ffe0f5;
      font-size: 16px;
      line-height: 1.7;
      image-rendering: pixelated;
    }

    #welcome-screen .message-box .from {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      color: #ffb3e6;
      font-style: italic;
    }

    #start-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      background: #ff6ec7;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 6px 0 #a0408a;
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
      margin-top: 8px;
    }
    #start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #a0408a; }
    #start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #a0408a; }

    /* ---- GAME SCREEN ---- */
    #game-screen { width: 100%; }

    #game-wrap {
      width: 100%;
      min-height: 520px;
      background: linear-gradient(180deg, #2d1155 0%, #5a2080 30%, #c0708a 65%, #a8d88a 100%);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      image-rendering: pixelated;
      border: 4px solid #ff9ee8;
      box-shadow: 0 0 40px rgba(255,110,200,0.3);
    }

    /* clouds */
    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.85);
      border-radius: 50px;
    }

    /* pixel stars in sky */
    .px-star {
      position: absolute;
      width: 4px; height: 4px;
      background: #ffe0f5;
      image-rendering: pixelated;
    }

    #hud {
      position: absolute;
      top: 12px; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      z-index: 5;
      pointer-events: none;
    }

    #hud-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.8vw, 11px);
      color: #ffcfe8;
      text-shadow: 2px 2px 0 #7a1060;
      line-height: 1.5;
    }

    #counter-bar {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      background: rgba(0,0,0,0.4);
      border: 2px solid #ff9ee8;
      border-radius: 8px;
      padding: 6px 12px;
      color: #ffcfe8;
    }

    #ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100px;
      background: #78c455;
    }
    .ground-dark {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 70px;
      background: #5a9a35;
    }
    .ground-top {
      position: absolute;
      bottom: 98px; left: 0; right: 0;
      height: 8px;
      background: #96d860;
    }

    .hole {
      position: absolute;
      bottom: 72px;
      width: 72px; height: 28px;
      background: #3a6a20;
      border-radius: 50%;
      z-index: 2;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
    }

    .cat-slot {
      position: absolute;
      bottom: 76px;
      width: 72px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cat-svg-wrap {
      transform: translateY(120px);
      transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }
    .cat-slot.up .cat-svg-wrap { transform: translateY(0px); }
    .cat-slot.petted .cat-svg-wrap { animation: wiggle 0.5s ease; }

    @keyframes wiggle {
      0%   { transform: translateY(0) rotate(0deg); }
      20%  { transform: translateY(0) rotate(-10deg); }
      40%  { transform: translateY(0) rotate(10deg); }
      60%  { transform: translateY(0) rotate(-6deg); }
      80%  { transform: translateY(0) rotate(6deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .msg-bubble {
      position: absolute;
      background: white;
      border: 3px solid #ff9ee8;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 11px;
      color: #a0208a;
      font-weight: 700;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px) scale(0.9);
      transition: opacity 0.2s, transform 0.2s;
      width: 160px;
      text-align: center;
      line-height: 1.5;
      bottom: 130px;
      font-family: 'Nunito', sans-serif;
    }
    .msg-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px; left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 10px solid #ff9ee8;
    }
    .msg-bubble.show { opacity: 1; transform: translateY(0) scale(1); }

    .heart-particle {
      position: absolute;
      animation: floatUp 1.2s ease forwards;
      font-size: 20px;
      pointer-events: none;
      z-index: 20;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.4); }
    }

    /* screen flash on pet */
    #flash {
      position: absolute; inset: 0;
      background: rgba(255,200,240,0.4);
      z-index: 15; pointer-events: none;
      opacity: 0;
      border-radius: 12px;
    }
    #flash.pop {
      animation: flashAnim 0.3s ease;
    }
    @keyframes flashAnim {
      0% { opacity: 0.5; }
      100% { opacity: 0; }
    }

    /* mobile friendly */
    @media (max-width: 500px) {
      #game-wrap { min-height: 420px; border-radius: 10px; }
      .msg-bubble { font-size: 10px; width: 130px; }
    }
  </style>
</head>
<body>

<div id="stars"></div>

<div id="app">

  <!-- WELCOME SCREEN -->
  <div id="welcome-screen" class="screen active">
    <h1>🐾 Dib's<br>Cat Garden 🌸</h1>

    <div class="pixel-cats-row" id="preview-cats"></div>

    <div class="message-box">
      Hey Dib 💕<br><br>
      Whenever you're feeling down, stressed, or just need a little boost —
      come here and pet some cats. They showed up just for you. 🐱
      <span class="from">— with all my love 🌷</span>
    </div>

    <button id="start-btn">▶ Start Petting!</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div id="game-wrap">
      <div id="flash"></div>

      <!-- clouds -->
      <div class="cloud" style="width:80px;height:26px;top:40px;left:30px;opacity:0.6;"></div>
      <div class="cloud" style="width:55px;height:20px;top:50px;left:75px;opacity:0.5;"></div>
      <div class="cloud" style="width:100px;height:30px;top:60px;right:50px;opacity:0.55;"></div>
      <div class="cloud" style="width:60px;height:20px;top:80px;right:95px;opacity:0.45;"></div>
      <div class="cloud" style="width:70px;height:24px;top:30px;left:220px;opacity:0.5;"></div>

      <!-- pixel stars -->
      <div class="px-star" style="top:50px;left:60px;opacity:0.9;"></div>
      <div class="px-star" style="top:80px;left:180px;opacity:0.7;"></div>
      <div class="px-star" style="top:45px;right:130px;opacity:0.8;"></div>
      <div class="px-star" style="top:100px;right:200px;opacity:0.6;"></div>
      <div class="px-star" style="top:65px;left:350px;opacity:0.9;"></div>
      <div class="px-star" style="top:35px;right:300px;opacity:0.7;"></div>

      <div id="hud">
        <div id="hud-title">🐾 Dib's Cat Garden</div>
        <div id="counter-bar">🐾 <span id="pet-count">0</span> pets</div>
      </div>

      <div id="ground">
        <div class="ground-dark"></div>
      </div>
      <div class="ground-top"></div>

    </div>
  </div>

</div>

<script>
// ---- STARS ----
(function() {
  const wrap = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
    wrap.appendChild(s);
  }
})();

// ---- PIXEL CAT DEFINITIONS ----
const PX = 5;
const COLS = 12, ROWS = 13;

const CATS = [
  // Orange tabby
  {
    pal: { O:'#E8831A', W:'#FFFFFF', B:'#1a1a1a', P:'#F7B8C2', _:null, S:'#C06010', G:'#F5A93A' },
    grid: [
      '_,_,B,_,_,_,_,_,B,_,_,_',
      '_,B,P,B,_,_,_,B,P,B,_,_',
      'B,O,O,O,B,B,B,O,O,O,B,_',
      'B,O,W,O,O,O,O,O,W,O,B,_',
      'B,O,O,B,O,O,O,B,O,O,B,_',
      '_,B,O,O,O,W,O,O,O,B,_,_',
      '_,B,G,G,G,G,G,G,G,B,_,_',
      'B,G,G,S,G,G,G,S,G,G,B,_',
      'B,G,G,G,G,G,G,G,G,G,B,_',
      'B,G,B,G,G,G,G,G,B,G,B,_',
      '_,B,G,B,G,G,G,B,G,B,_,_',
      '_,_,B,G,B,B,B,G,B,_,_,_',
      '_,_,_,B,_,_,_,B,_,_,_,_',
    ]
  },
  // Calico
  {
    pal: { O:'#E8831A', W:'#FFFFFF', B:'#1a1a1a', P:'#F7B8C2', _:null, S:'#888', G:'#ddd' },
    grid: [
      '_,_,B,_,_,_,_,_,B,_,_,_',
      '_,B,P,B,_,_,_,B,P,B,_,_',
      'B,W,W,W,B,B,B,O,O,O,B,_',
      'B,W,W,W,W,W,O,O,W,O,B,_',
      'B,W,B,W,W,W,O,B,O,O,B,_',
      '_,B,W,W,W,W,O,O,O,B,_,_',
      '_,B,W,O,O,O,O,O,W,B,_,_',
      'B,W,O,O,B,O,O,B,W,W,B,_',
      'B,W,O,O,O,O,O,O,W,W,B,_',
      'B,W,W,B,O,O,O,B,W,W,B,_',
      '_,B,W,B,W,O,W,B,W,B,_,_',
      '_,_,B,W,B,B,B,W,B,_,_,_',
      '_,_,_,B,_,_,_,B,_,_,_,_',
    ]
  },
  // Gray
  {
    pal: { O:'#888', W:'#FFFFFF', B:'#1a1a1a', P:'#F7B8C2', _:null, S:'#555', G:'#ccc' },
    grid: [
      '_,_,B,_,_,_,_,_,B,_,_,_',
      '_,B,P,B,_,_,_,B,P,B,_,_',
      'B,O,O,O,B,B,B,O,O,O,B,_',
      'B,G,W,G,G,G,G,G,W,G,B,_',
      'B,G,G,B,G,G,G,B,G,G,B,_',
      '_,B,G,G,G,W,G,G,G,B,_,_',
      '_,B,O,O,O,O,O,O,O,B,_,_',
      'B,O,S,O,B,O,O,B,O,S,B,_',
      'B,O,O,O,O,O,O,O,O,O,B,_',
      'B,O,B,O,O,O,O,O,B,O,B,_',
      '_,B,O,B,O,O,O,B,O,B,_,_',
      '_,_,B,O,B,B,B,O,B,_,_,_',
      '_,_,_,B,_,_,_,B,_,_,_,_',
    ]
  },
  // Tuxedo
  {
    pal: { O:'#222', W:'#FFFFFF', B:'#1a1a1a', P:'#F7B8C2', _:null, S:'#555', G:'#aaa' },
    grid: [
      '_,_,B,_,_,_,_,_,B,_,_,_',
      '_,B,P,B,_,_,_,B,P,B,_,_',
      'B,O,O,O,B,B,B,O,O,O,B,_',
      'B,O,W,O,O,O,O,O,W,O,B,_',
      'B,O,O,B,O,O,O,B,O,O,B,_',
      '_,B,O,O,W,W,W,O,O,B,_,_',
      '_,B,O,W,W,W,W,W,O,B,_,_',
      'B,O,W,W,B,W,W,B,W,O,B,_',
      'B,O,W,W,W,W,W,W,W,O,B,_',
      'B,O,B,W,W,W,W,W,B,O,B,_',
      '_,B,O,B,W,W,W,B,O,B,_,_',
      '_,_,B,O,B,B,B,O,B,_,_,_',
      '_,_,_,B,_,_,_,B,_,_,_,_',
    ]
  },
];

function makeCatCanvas(catDef, scale) {
  scale = scale || 1;
  const s = PX * scale;
  const canvas = document.createElement('canvas');
  canvas.width = COLS * s;
  canvas.height = ROWS * s;
  canvas.style.width = (COLS * s) + 'px';
  canvas.style.height = (ROWS * s) + 'px';
  canvas.style.imageRendering = 'pixelated';
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  catDef.grid.forEach((row, r) => {
    row.split(',').forEach((cell, c) => {
      const color = catDef.pal[cell.trim()];
      if (!color) return;
      ctx.fillStyle = color;
      ctx.fillRect(c * s, r * s, s, s);
    });
  });
  return canvas;
}

// ---- PREVIEW CATS on welcome ----
const previewRow = document.getElementById('preview-cats');
CATS.forEach((cat, i) => {
  const c = makeCatCanvas(cat, 1.4);
  c.style.margin = '0 4px';
  previewRow.appendChild(c);
});

// ---- START BUTTON ----
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('welcome-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  initGame();
});

// ---- MESSAGES ----
const messages = [
  "Dib, you're my favourite human 🌸",
  "You deserve all the good things! 🍀",
  "Purrr... you're doing amazing 💕",
  "Have you eaten? Go eat! 🍜",
  "Your smile fixes my whole day 🌞",
  "Dib is wonderful & loved ✨",
  "Take a deep breath. It's okay 💙",
  "I believe in you always!! 🦋",
  "You're literally the best 🏆",
  "Big Dib fan over here 🐾💗",
  "Just checking in — we love you 🌷",
  "You = incredibly lovable 💌",
  "Even cats know you're special 🐈",
  "Be gentle with yourself today 🫂",
  "Dib mode: ON. Unstoppable 🚀",
  "Your laugh is my favourite sound 🎶",
  "Fun fact: you're doing great 📊",
  "This cat came just to see you 🐱",
  "You light up every room, Dib 🕯️",
  "Rest if you need to. You've earned it 💤",
];

// ---- GAME INIT ----
function initGame() {
  const gameWrap = document.getElementById('game-wrap');
  const SLOT_COUNT = 4;
  const slots = [];
  let petCount = 0;
  const gameWidth = gameWrap.offsetWidth || 680;
  const spacing = gameWidth / (SLOT_COUNT + 1);

  for (let i = 0; i < SLOT_COUNT; i++) {
    const x = Math.round(spacing * (i + 1) - 36);

    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.style.left = x + 'px';
    gameWrap.appendChild(hole);

    const slot = document.createElement('div');
    slot.className = 'cat-slot';
    slot.style.left = x + 'px';
    slot.style.width = '72px';

    const svgWrap = document.createElement('div');
    svgWrap.className = 'cat-svg-wrap';
    const catCanvas = makeCatCanvas(CATS[i % CATS.length]);
    svgWrap.appendChild(catCanvas);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    // center bubble above slot
    const bLeft = x - 44;
    bubble.style.left = Math.max(4, Math.min(gameWidth - 168, bLeft)) + 'px';

    slot.appendChild(svgWrap);
    gameWrap.appendChild(bubble);
    gameWrap.appendChild(slot);

    const slotObj = { el: slot, svgWrap, bubble, up: false, timer: null, msgTimer: null };
    slots.push(slotObj);

    svgWrap.addEventListener('click', () => petCat(slotObj));
    svgWrap.addEventListener('touchstart', (e) => { e.preventDefault(); petCat(slotObj); }, { passive: false });
  }

  function petCat(slotObj) {
    if (!slotObj.up) return;
    petCount++;
    document.getElementById('pet-count').textContent = petCount;
    slotObj.el.classList.add('petted');
    setTimeout(() => slotObj.el.classList.remove('petted'), 600);
    const msg = messages[Math.floor(Math.random() * messages.length)];
    slotObj.bubble.textContent = msg;
    slotObj.bubble.classList.add('show');
    playChime();
    spawnHearts(slotObj);
    flashScreen();
    clearTimeout(slotObj.msgTimer);
    slotObj.msgTimer = setTimeout(() => slotObj.bubble.classList.remove('show'), 3000);
    clearTimeout(slotObj.timer);
    slotObj.timer = setTimeout(() => hideSlot(slotObj), 2000);
  }

  function showSlot(slotObj) {
    slotObj.up = true;
    slotObj.el.classList.add('up');
    const dur = 2500 + Math.random() * 2500;
    slotObj.timer = setTimeout(() => hideSlot(slotObj), dur);
  }

  function hideSlot(slotObj) {
    slotObj.up = false;
    slotObj.el.classList.remove('up');
    slotObj.bubble.classList.remove('show');
    clearTimeout(slotObj.timer);
  }

  function spawnHearts(slotObj) {
    const rect = slotObj.el.getBoundingClientRect();
    const wrapRect = gameWrap.getBoundingClientRect();
    const cx = rect.left - wrapRect.left + 36;
    const cy = rect.top - wrapRect.top;
    const emojis = ['💕','✨','🌸','💗','⭐','💖','🐾','🌷'];
    for (let i = 0; i < 6; i++) {
      const h = document.createElement('span');
      h.className = 'heart-particle';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = (cx + (Math.random() - 0.5) * 50) + 'px';
      h.style.top = cy + 'px';
      h.style.animationDelay = (i * 0.1) + 's';
      gameWrap.appendChild(h);
      setTimeout(() => h.remove(), 1500);
    }
  }

  function flashScreen() {
    const f = document.getElementById('flash');
    f.classList.remove('pop');
    void f.offsetWidth;
    f.classList.add('pop');
  }

  // ---- AUDIO ----
  let audioCtx = null;
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playNote(freq, start, dur, vol) {
    vol = vol || 0.18;
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
    gain.gain.setValueAtTime(0, ctx.currentTime + start);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + 0.05);
  }
  const melodies = [
    [523, 659, 784, 1047],
    [392, 494, 587, 740],
    [440, 554, 659, 880],
    [349, 440, 523, 698],
    [528, 660, 792, 1056],
  ];
  function playChime() {
    const mel = melodies[Math.floor(Math.random() * melodies.length)];
    mel.forEach((freq, i) => playNote(freq, i * 0.13, 0.5));
  }

  // ---- SCHEDULER ----
  function schedulePops() {
    const downSlots = slots.filter(s => !s.up);
    if (downSlots.length > 0) {
      const pick = downSlots[Math.floor(Math.random() * downSlots.length)];
      showSlot(pick);
    }
    setTimeout(schedulePops, 1200 + Math.random() * 1800);
  }
  setTimeout(schedulePops, 800);
}
</script>
</body>
</html>
